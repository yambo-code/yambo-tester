p2y = "p2y"
a2y = "a2y"
# optional executables
ypp = "ypp"
yambo_ph = "yambo_ph"
ypp_ph = "ypp_ph"
yambo_rt = "yambo_rt"
ypp_rt = "ypp_rt"
yambo_sc = "yambo_sc"
ypp_sc = "ypp_sc"
yambo_nl = "yambo_nl"
ypp_nl = "ypp_nl"

[tests]
Al_bulk = ["DFT", "GW-OPTICS", "ELPH"]
He = ["DFT"]
PA_chain = ["PA_chain"]
