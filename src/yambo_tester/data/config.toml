# Empty parameter means default
[parameters]
label = "cirun"
tests_dir = ""
scratch_dir = "scratch"
cache_dir = "cache"
yambo_bin = ""
mpi_launcher = "mpirun"
nprocs = 2
thrs = 1
tollerance = 0.1
runlevels = []
